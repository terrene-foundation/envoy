name: Tests

# The Python correctness gate: type-checks + the full test suite (all tiers
# incl. e2e) + a coverage floor, on every code PR and every push to main.
# Mirrors the local gate (`mypy envoy/` + `pyright envoy/` + `pytest tests/`)
# so "CI green" means the same thing a developer's pre-push run means. This is
# the backstop that makes the strict-xfail acceptance tripwire (and every other
# test) automatically load-bearing — without it, main can go red undetected.
#
# Required-check design (skip-sentinel): the trigger has NO paths-ignore, so the
# `tests-gate` job ALWAYS runs and reports — making it a safe branch-ruleset
# required check. The expensive `test` matrix runs ONLY when code paths changed
# (the `changes` filter); on a doc-only PR `tests-gate` short-circuits to pass.
# `tests-gate` (not the matrix legs) is the stable name wired into the main
# ruleset, which has an empty bypass list so even `gh pr merge --admin` cannot
# merge over red CI (the classic review requirement stays admin-bypassable, so
# solo-merge is preserved — only CI is hard).
#
# Third-party actions are SHA-pinned (supply-chain hardening); the trailing
# comment records the human-readable tag.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'envoy/**'
              - 'tests/**'
              - 'conftest.py'
              - 'pyproject.toml'
              - 'uv.lock'
              - '.github/workflows/tests.yml'

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (3.11 — catches 3.11-only gotchas, e.g. the Lock-factory
        # isinstance trap) + latest the project develops against.
        python-version: ["3.11", "3.13"]
    name: test (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Sync dependencies (project editable + dev extra)
        run: uv sync --extra dev --python ${{ matrix.python-version }}

      - name: Type-check (mypy)
        run: uv run mypy envoy/

      - name: Type-check (pyright)
        run: uv run pyright envoy/

      - name: Collection gate (orphan-detection Rule 5 — collect must exit 0)
        run: uv run pytest tests/ --collect-only -q

      - name: Test suite + coverage floor (all tiers incl. e2e)
        run: >-
          uv run pytest tests/
          --cov=envoy --cov-report=term-missing --cov-fail-under=90

  tests-gate:
    # The single REQUIRED status check (stable name). Always runs + reports so a
    # doc-only PR (where `test` is skipped) never stalls on a never-reported
    # required check.
    needs: [changes, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify test outcome
        run: |
          if [ "${{ needs.changes.outputs.code }}" != "true" ]; then
            echo "Doc-only change — no code paths touched; test matrix not required."
            exit 0
          fi
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "::error::test matrix result = ${{ needs.test.result }} (expected success)"
            exit 1
          fi
          echo "All test-matrix jobs passed."
